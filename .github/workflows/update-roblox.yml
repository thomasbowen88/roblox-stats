name: Update Roblox Stats

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-roblox-stats
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Update data
        env:
          GR_RBX_MASTER_URL: "https://script.google.com/macros/s/AKfycby5xl6AmDmXWeA5yTHh4oZZqQtZ-i0Gi_g5EDrSSgimLCXBi2gMvjz5xAjRMFLqwXTD/exec?mode=combined"
        run: npm run update

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update Roblox stats"
            git pull --rebase origin main
            git push
          fi
